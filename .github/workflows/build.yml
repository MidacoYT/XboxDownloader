name: Build and Release

on:
  push:
    branches: [master, main]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate CIK bundle from secret
        run: |
          $b64 = "${{ secrets.CIK_ARCHIVE }}"
          if ($b64) {
            $bytes = [Convert]::FromBase64String($b64)
            $zip = "$env:TEMP\cik.zip"
            [IO.File]::WriteAllBytes($zip, $bytes)
            Expand-Archive -Path $zip -DestinationPath "$env:TEMP\cik" -Force
            $key = [System.Text.Encoding]::UTF8.GetBytes("XboxDownloader2024!@#$")
            $files = Get-ChildItem "$env:TEMP\cik\*.cik"
            $sb = [System.Text.StringBuilder]::new()
            [void]$sb.AppendLine("const CIK_ENCRYPTED = {")
            foreach ($f in $files) {
              $data = [IO.File]::ReadAllBytes($f.FullName)
              for ($i = 0; $i -lt $data.Length; $i++) { $data[$i] = $data[$i] -bxor $key[$i % $key.Length] }
              [void]$sb.AppendLine("  '$($f.Name)': '$([Convert]::ToBase64String($data))',")
            }
            [void]$sb.AppendLine("};")
            [void]$sb.AppendLine("module.exports = { CIK_ENCRYPTED };")
            Set-Content -Path "electron\cik-bundle.js" -Value $sb.ToString()
            Write-Host "Generated cik-bundle.js with $($files.Count) CIK files"
          } else {
            Write-Host "No CIK_ARCHIVE secret - creating empty bundle"
            Set-Content -Path "electron\cik-bundle.js" -Value "module.exports = { CIK_ENCRYPTED: {} };"
          }

      - name: Build installer
        run: npx vite build && npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release
        run: |
          $ver = (Get-Content package.json | ConvertFrom-Json).version
          $tag = "v$ver"
          gh release create $tag --title $tag --notes "" release\*.exe release\*.yml release\*.blockmap
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
