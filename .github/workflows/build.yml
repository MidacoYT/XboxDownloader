name: Build and Release

on:
  push:
    branches: [master, main]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore CIK files
        if: env.CIK_ARCHIVE != ''
        run: |
          $b64 = "${{ secrets.CIK_ARCHIVE }}"
          if ($b64) {
            $bytes = [Convert]::FromBase64String($b64)
            [IO.File]::WriteAllBytes("$env:TEMP\cik.zip", $bytes)
            Expand-Archive -Path "$env:TEMP\cik.zip" -DestinationPath "Xvd\Cik" -Force
            Write-Host "CIK files restored: $(@(Get-ChildItem Xvd\Cik).Length) files"
          }

      - name: Build installer
        run: npx vite build && npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release
        run: |
          $ver = (Get-Content package.json | ConvertFrom-Json).version
          $tag = "v$ver"
          gh release create $tag --title $tag --notes "" release\*.exe release\*.yml release\*.blockmap
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
