name: Build and Release

on:
  push:
    branches: [master, main]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Get version
        run: |
          $ver = (Get-Content package.json | ConvertFrom-Json).version
          echo "BUILD_VERSION=$ver" >> $env:GITHUB_ENV

      - name: Build frontend
        run: npx vite build

      - name: Package app
        run: npx electron-builder --win --x64 --config.extraMetadata.version=$env:BUILD_VERSION
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Zip app for updates
        run: |
          Compress-Archive -Path "release\win-unpacked\*" -DestinationPath "release\Xbox-Downloader-$env:BUILD_VERSION.zip" -Force

      - name: Create release and upload assets
        run: |
          $tag = "v$env:BUILD_VERSION"
          $existing = gh api repos/MidacoYT/XboxDownloader/releases --jq ".[] | select(.tag_name == `"$tag`") | .id"
          if ($existing) { gh api -X DELETE repos/MidacoYT/XboxDownloader/releases/$existing }
          gh release create $tag --title $tag --notes "Auto-build" release\*.exe release\*.zip release\*.yml release\*.blockmap
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
