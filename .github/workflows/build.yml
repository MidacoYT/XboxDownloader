name: Build and Release

on:
  push:
    branches: [master, main]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installer
        run: npx vite build && npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release (published, not draft)
        run: |
          $ver = (Get-Content package.json | ConvertFrom-Json).version
          $tag = "v$ver"
          gh release create $tag --title $tag --notes "" release\*.exe release\*.yml release\*.blockmap
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
