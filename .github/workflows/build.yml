name: Build and Release

on:
  push:
    branches: [master, main]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Get version from package.json
        run: |
          $ver = (Get-Content package.json | ConvertFrom-Json).version
          echo "BUILD_VERSION=$ver" >> $env:GITHUB_ENV

      - name: Import code signing certificate
        if: env.CERT_FILE != ''
        run: |
          echo "${{ secrets.CERT_BASE64 }}" | certutil -decode - "$env:TEMP\cert.pfx"
          echo "CERT_FILE=$env:TEMP\cert.pfx" >> $env:GITHUB_ENV
          echo "CERT_PASS=${{ secrets.CERT_PASS }}" >> $env:GITHUB_ENV

      - name: Build & publish
        run: npm run publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
